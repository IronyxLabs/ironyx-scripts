name: sonar.end
description: End SonarCloud analysis

inputs:
  token:
    description: SonarQube token
    required: true
  packages_cache_key:
    description: Cache Key for sonar packages
    required: true
  scanner_cache_key:
    description: Cache Key for sonar scanner
    required: true
  analysis_cache_key:
    description: Cache Key for sonar analysis
    required: true

runs:
  using: composite
  steps:
    - name: Download Sonar Packages
      uses: actions/cache@v5
      with:
        key: ${{ inputs.packages_cache_key }}
        path: ~/sonar/cache

    - name: Download Sonar Scanner
      uses: actions/cache@v5
      with:
        key: ${{ inputs.scanner_cache_key }}
        path: ${{ runner.temp }}/scanner

    - name: Download Sonar Analysis
      uses: actions/cache@v5
      with:
        key: ${{ inputs.analysis_cache_key }}
        path: src/.sonarqube

    - name: End Analysis
      shell: bash
      run: ${{ runner.temp }}/scanner/dotnet-sonarscanner end /d:sonar.token="${{ inputs.token }}"
      working-directory: src
