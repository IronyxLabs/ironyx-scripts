name: sonar.end
description: End SonarCloud analysis

inputs:
  token:
    description: SonarQube token
    required: true
  packages_cache_key:
    description: Cache Key for sonar packages
    required: true
  scanner_cache_key:
    description: Cache Key for sonar scanner
    required: true

runs:
  using: composite
  steps:
    - name: End Analysis
      shell: bash
      run: ${{ runner.temp }}/scanner/dotnet-sonarscanner end /d:sonar.token="${{ inputs.token }}"
      working-directory: src
