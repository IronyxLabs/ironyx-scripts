name: dotnet.publish-test-result
description: Publishing test result to TestSpace.

inputs:
  token:
    description: TestSpace token
    required: true

runs:
  using: composite
  steps:
    - name: Install TestSpace CLI
      uses: testspace-com/setup-testspace@v1
      with:
        domain: ${{ github.repository_owner }}

    - name: Publish Test Result
      id: publish
      run: testspace results/*.trx
      if: always()
      shell: bash
      env:
        TESTSPACE_TOKEN: ${{ inputs.token }}
