name: dotnet.test
description: Allows to test a built dotnet project

runs:
  using: composite
  steps:
    - name: Execute Tests
      run: dotnet test **/**/*.Test.Unit.csproj --logger "trx;LogFileName=test-results.trx" --results-directory results --collect:"XPlat Code Coverage"
      shell: bash
      continue-on-error: true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: test_results_${{ github.run_id }}
        path: ${{ github.workspace }}/results
        retention-days: 1
