on:
  workflow_call:
    inputs:
      sonar_project-key:
        description: SonarQube project key
        required: true
        type: string

jobs:
  restore-dependencies:
    runs-on: ubuntu-latest

    outputs:
      cache_key: ${{ steps.dependencies.outputs.cache_key }}

    steps:
      - name: Checkout Code
        id: checkout
        uses: actions/checkout@v6

      - name: Restore Dependencies
        id: dependencies
        uses: IronyxLabs/ironyx-scripts/.github/actions/dotnet/restore-dependencies@chore/1-create-ci-workflow-for-net-applications

  build:
    needs: [restore-dependencies]
    runs-on: ubuntu-latest

    outputs:
      artifact_key: ${{ steps.build.outputs.artifact_key }}

    steps:
      - name: Checkout Code
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize SonarCloud Scanner
        id: sonar-init
        uses: IronyxLabs/ironyx-scripts/.github/actions/sonar/init@chore/1-create-ci-workflow-for-net-applications

      - name: Begin SonarQube Analysis
        id: sonar-begin
        uses: IronyxLabs/ironyx-scripts/.github/actions/sonar/begin@chore/1-create-ci-workflow-for-net-applications
        with:
          project-key: ${{ inputs.sonar_project-key }}

      - name: Build
        id: build
        uses: IronyxLabs/ironyx-scripts/.github/actions/dotnet/build@chore/1-create-ci-workflow-for-net-applications
        with:
          cache_key: ${{ needs.restore-dependencies.outputs.cache_key }}

      - name: End SonarQube Analysis
        id: sonar-end
        uses: IronyxLabs/ironyx-scripts/.github/actions/sonar/end@chore/1-create-ci-workflow-for-net-applications

  test:
    needs: [restore-dependencies, build]
    runs-on: ubuntu-latest

    steps:
      - name: Execute Tests
        id: test
        uses: IronyxLabs/ironyx-scripts/.github/actions/dotnet/test@chore/1-create-ci-workflow-for-net-applications
        with:
          artifact_key: ${{ needs.build.outputs.artifact_key }}
